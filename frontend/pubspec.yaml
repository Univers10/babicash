name: babicash
description: "Application de gestion commerciale multi-boutique — BabiCash"
publish_to: none
version: 1.0.0+1

environment:
  sdk: ">=3.3.0 <4.0.0"

dependencies:
  flutter:
    sdk: flutter

  # State management
  flutter_riverpod: ^2.5.1
  riverpod_annotation: ^2.3.5

  # Navigation
  go_router: ^14.2.0

  # Network
  dio: ^5.4.3+1
  pretty_dio_logger: ^1.3.1

  # Local DB (Offline-First)
  drift: ^2.18.0
  sqlite3_flutter_libs: ^0.5.22
  path_provider: ^2.1.3
  path: ^1.9.0

  # Secure storage (JWT token)
  flutter_secure_storage: ^9.2.2

  # Data classes
  freezed_annotation: ^2.4.1
  json_annotation: ^4.9.0

  # Connectivity
  connectivity_plus: ^6.0.3

  # PDF & impression thermique Bluetooth
  pdf: ^3.11.1
  printing: ^5.13.1
  pos_universal_printer: ^0.2.10
  permission_handler: ^11.3.1
  share_plus: ^12.0.2
  url_launcher: ^6.3.0

  # Icons
  material_symbols_icons: ^4.2719.3

  # Identifiants uniques locaux
  uuid: ^4.4.0

  # Splash animé
  video_player: ^2.9.2

  # UI utilitaires
  intl: ^0.19.0
  cached_network_image: ^3.3.1
  shimmer: ^3.0.0

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^4.0.0

  # Code generation
  build_runner: ^2.4.14
  riverpod_generator: ^2.4.0
  drift_dev: ^2.20.0
  freezed: ^2.5.8
  json_serializable: ^6.8.0

flutter:
  uses-material-design: true
  assets:
    - assets/images/
